[vars]
CAMUNDA_CLUSTER_ID = "425f10fa-c898-4b4b-b303-eac095286716"
CAMUNDA_REGION = "ric-1"
CAMUNDA_AUTH_URL = "https://login.cloud.camunda.io/oauth/token"
PROCESS_ID = "Process_Onboarding_v8"
