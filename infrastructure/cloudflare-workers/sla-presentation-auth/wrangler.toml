# Protected URL: https://sla.agentic-innovations.com
#
# This worker protects the SLA Governance presentation with:
# - Descope OTP authentication
# - SLA Governance branding
# - Email restrictions: proth1@gmail.com, @agentic-innovations.com

[vars]
DESCOPE_PROJECT_ID = "P3AN0dLWf9ZTyBi3vF6xaDbThO8q"
PAGES_URL = "https://sla-presentation.pages.dev"
WORKER_DOMAIN = "https://sla.agentic-innovations.com"

# Email restrictions are hardcoded in src/index.ts:
# - ALLOWED_EMAILS = ['proth1@gmail.com']
# - ALLOWED_DOMAINS = ['agentic-innovations.com']

# REQUIRED: Configure Cloudflare Rate Limiting Rule externally:
# Path: /auth/send-otp, Method: POST, Limit: 5 req/min/IP, Action: Block
# This prevents OTP spam without any in-worker code.

# KV namespace for OTP verify rate limiting (per-email brute-force prevention)
# Create namespace via Cloudflare dashboard or API, then replace the ID below:
#   Dashboard: Workers & Pages > KV > Create namespace > "sla-presentation-auth-RATE_LIMIT_KV"
#   API: POST /accounts/{account_id}/storage/kv/namespaces {"title":"sla-presentation-auth-RATE_LIMIT_KV"}
# The worker gracefully degrades if KV is unavailable (rate limiting skipped).
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
