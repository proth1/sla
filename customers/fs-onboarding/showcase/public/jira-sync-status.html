<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jira Sync Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: #94a3b8; font-size: 0.875rem; margin-bottom: 20px; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; }
  .stat { background: #1e293b; border-radius: 8px; padding: 12px 20px; flex: 1; text-align: center; }
  .stat .value { font-size: 1.75rem; font-weight: 700; }
  .stat .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat.outbound .value { color: #38bdf8; }
  .stat.inbound .value { color: #4ade80; }
  .stat.error .value { color: #f87171; }
  .stat.pending .value { color: #fbbf24; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
  th { background: #334155; padding: 10px 14px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
  td { padding: 10px 14px; border-top: 1px solid #334155; font-size: 0.875rem; }
  tr:hover { background: #334155; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .badge.outbound { background: #0c4a6e; color: #38bdf8; }
  .badge.inbound { background: #14532d; color: #4ade80; }
  .badge.error { background: #7f1d1d; color: #f87171; }
  a { color: #38bdf8; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 40px; color: #64748b; }
  .refresh-note { color: #64748b; font-size: 0.75rem; margin-top: 12px; text-align: right; }
</style>
</head>
<body>
  <h1>Jira Sync Status</h1>
  <p class="subtitle">Camunda 8 &harr; Jira AP Project &mdash; Bidirectional Task Sync</p>
  <div class="stats">
    <div class="stat outbound"><div class="value" id="countOutbound">-</div><div class="label">Outbound</div></div>
    <div class="stat inbound"><div class="value" id="countInbound">-</div><div class="label">Inbound</div></div>
    <div class="stat pending"><div class="value" id="countPending">-</div><div class="label">Pending</div></div>
    <div class="stat error"><div class="value" id="countError">-</div><div class="label">Errors</div></div>
  </div>
  <table>
    <thead><tr><th>Time</th><th>Direction</th><th>Camunda Task</th><th>Jira Issue</th><th>Status</th></tr></thead>
    <tbody id="events"><tr><td colspan="5" class="empty">Waiting for sync events...</td></tr></tbody>
  </table>
  <p class="refresh-note">Auto-refreshes every 5s</p>
<script>
const JIRA_BASE = 'https://agentic-sdlc.atlassian.net';
const OPERATE_BASE = 'https://ric-1.operate.camunda.io/425f10fa-c898-4b4b-b303-eac095286716';

async function refresh() {
  try {
    const res = await fetch('/api/sync-status');
    const data = await res.json();
    document.getElementById('countOutbound').textContent = data.stats.outbound;
    document.getElementById('countInbound').textContent = data.stats.inbound;
    document.getElementById('countPending').textContent = data.stats.pending;
    document.getElementById('countError').textContent = data.stats.errors;
    const tbody = document.getElementById('events');
    if (!data.events.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Waiting for sync events...</td></tr>';
      return;
    }
    tbody.innerHTML = data.events.map(e => `<tr>
      <td>${new Date(e.timestamp).toLocaleTimeString()}</td>
      <td><span class="badge ${e.direction}">${e.direction.toUpperCase()}</span></td>
      <td>${e.camundaTaskKey || '-'}</td>
      <td>${e.jiraIssueKey ? `<a href="${JIRA_BASE}/browse/${e.jiraIssueKey}" target="_blank">${e.jiraIssueKey}</a>` : '-'}</td>
      <td>${e.status}</td>
    </tr>`).join('');
  } catch { /* retry next cycle */ }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
